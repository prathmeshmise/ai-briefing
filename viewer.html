<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Data Intelligence — Daily Briefing</title>
<meta name="theme-color" content="#f6f2ea" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#131110" media="(prefers-color-scheme: dark)" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="briefings-data.js"></script>
<style>
  :root {
    --bg: #f6f2ea;
    --bg-wash: rgba(166, 61, 47, 0.045);
    --panel: #fffcf7;
    --ink: #211d18;
    --ink-soft: #575046;
    --ink-faint: #8d857a;
    --line: #e7e0d3;
    --line-soft: #efe9dd;
    --accent: #a63d2f;
    --accent-strong: #8a3226;
    --accent-soft: #f5e9e1;
    --pill: #f1ebdf;
    --pill-active: #211d18;
    --shadow: 0 1px 2px rgba(63, 48, 28, 0.05), 0 12px 32px rgba(63, 48, 28, 0.07);
    --serif: "Newsreader", Georgia, "Times New Roman", serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg: #131110;
    --bg-wash: rgba(221, 127, 95, 0.05);
    --panel: #1c1917;
    --ink: #ece5d9;
    --ink-soft: #b7aea1;
    --ink-faint: #857c70;
    --line: #2e2924;
    --line-soft: #272220;
    --accent: #dd7f5f;
    --accent-strong: #e89678;
    --accent-soft: #32231c;
    --pill: #242019;
    --pill-active: #ece5d9;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 12px 32px rgba(0, 0, 0, 0.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(1100px 420px at 50% -80px, var(--bg-wash), transparent 70%);
    background-repeat: no-repeat;
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    min-height: 100vh;
  }
  ::selection { background: var(--accent-soft); color: var(--ink); }
  a { color: var(--accent); }

  .progress {
    position: fixed; top: 0; left: 0; height: 2px; width: 100%;
    background: var(--accent); transform-origin: 0 50%; transform: scaleX(0);
    z-index: 40;
  }

  .wrap { max-width: 768px; margin: 0 auto; padding: 0 22px 72px; }

  header.top {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    -webkit-backdrop-filter: saturate(1.3) blur(12px);
    backdrop-filter: saturate(1.3) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .top-inner {
    max-width: 768px; margin: 0 auto; padding: 13px 22px;
    display: flex; align-items: center; gap: 13px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .logo {
    width: 36px; height: 36px; border-radius: 9px; flex: none;
    background: linear-gradient(150deg, var(--accent), var(--accent-strong));
    display: grid; place-items: center;
    color: #fdf8f2; font-family: var(--serif); font-weight: 600; font-size: 17px;
    letter-spacing: 0.01em;
    box-shadow: var(--shadow);
  }
  html[data-theme="dark"] .logo { color: #241511; }
  .brand h1 {
    font-family: var(--serif); font-size: 18px; font-weight: 600;
    margin: 0; letter-spacing: -0.005em;
  }
  .brand p {
    font-size: 11px; margin: 0; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.09em; font-weight: 500;
  }
  .spacer { flex: 1; }
  .theme-btn {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft);
    width: 38px; height: 38px; border-radius: 10px; cursor: pointer; padding: 0;
    display: grid; place-items: center; transition: color .15s, border-color .15s, transform .15s;
  }
  .theme-btn:hover { color: var(--accent); border-color: var(--ink-faint); }
  .theme-btn:active { transform: scale(0.94); }
  .theme-btn svg { width: 17px; height: 17px; display: block; }
  html[data-theme="dark"] .theme-btn .moon { display: none; }
  html:not([data-theme="dark"]) .theme-btn .sun { display: none; }

  .datebar {
    display: flex; gap: 8px; overflow-x: auto; padding: 18px 0 6px;
    scrollbar-width: none;
  }
  .datebar::-webkit-scrollbar { display: none; }
  .pill {
    flex: none; border: 1px solid var(--line); background: var(--pill);
    color: var(--ink-soft); border-radius: 11px; padding: 8px 15px 9px; cursor: pointer;
    font-family: var(--sans); font-size: 13.5px; font-weight: 600; white-space: nowrap;
    display: flex; flex-direction: column; align-items: flex-start; line-height: 1.3;
    transition: border-color .15s, background .15s, color .15s;
  }
  .pill .dow {
    font-size: 10.5px; font-weight: 600; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 5px;
  }
  .pill .dow .dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex: none;
  }
  .pill:hover { border-color: var(--ink-faint); }
  .pill.active { background: var(--pill-active); color: var(--bg); border-color: var(--pill-active); }
  .pill.active .dow { color: var(--bg); opacity: 0.65; }
  .pill.active .dow .dot { background: var(--accent); opacity: 1; }
  .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); padding: 42px 48px 46px; margin-top: 14px;
    animation: rise 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  .kicker {
    color: var(--accent); font-size: 12px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .headline {
    font-family: var(--serif); font-size: 40px; font-weight: 600;
    letter-spacing: -0.015em; line-height: 1.1; margin: 8px 0 6px;
  }
  .gen { color: var(--ink-faint); font-size: 12.5px; margin-bottom: 26px; }

  article {
    font-family: var(--serif); font-size: 18.5px; line-height: 1.68;
    color: var(--ink); counter-reset: sec;
    font-optical-sizing: auto;
  }
  article h2 {
    counter-increment: sec;
    font-family: var(--sans); font-size: 12.5px; font-weight: 700;
    letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-soft);
    margin: 40px 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 10px;
  }
  article h2::before {
    content: counter(sec, decimal-leading-zero);
    color: var(--accent); font-size: 12px; font-weight: 700;
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  }
  article h3 {
    font-family: var(--serif); font-size: 21px; font-weight: 600;
    margin: 26px 0 8px; letter-spacing: -0.01em; line-height: 1.3;
  }
  article p { margin: 0 0 16px; }
  article em { font-style: italic; }
  article ul { margin: 0 0 18px; padding-left: 2px; list-style: none; }
  article li { position: relative; padding-left: 24px; margin: 0 0 14px; }
  article li::before {
    content: ""; position: absolute; left: 3px; top: 0.58em;
    width: 6px; height: 6px; background: var(--accent);
    transform: rotate(45deg); border-radius: 1px;
  }
  article strong { font-weight: 650; }
  article a {
    color: var(--accent); text-decoration: underline;
    text-decoration-color: color-mix(in srgb, var(--accent) 38%, transparent);
    text-decoration-thickness: 1px; text-underline-offset: 3px;
    transition: color .12s, text-decoration-color .12s;
  }
  article a:hover { color: var(--accent-strong); text-decoration-color: currentColor; }
  article code {
    font-family: var(--mono); font-size: 0.82em;
    background: var(--accent-soft); color: var(--ink);
    padding: 2px 6px; border-radius: 5px;
  }
  article hr {
    border: none; height: 1px; width: 96px;
    background: var(--line); margin: 36px auto;
  }

  .lead {
    position: relative;
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 22px; margin: 0 0 10px;
    font-size: 20px; line-height: 1.62;
  }
  .lead-kicker {
    display: block; font-family: var(--sans); font-size: 11.5px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent);
    margin-bottom: 8px;
  }

  .empty { text-align: center; padding: 64px 20px; color: var(--ink-faint); font-family: var(--sans); }
  .empty .big { font-size: 40px; margin-bottom: 12px; }
  .empty h2 { color: var(--ink); font-family: var(--serif); font-size: 22px; font-weight: 600; margin: 0 0 8px; }
  .empty p { max-width: 440px; margin: 0 auto; font-size: 15px; }

  footer {
    text-align: center; color: var(--ink-faint); margin-top: 36px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase;
  }
  footer .rule {
    width: 96px; height: 1px; background: var(--line); margin: 0 auto 16px;
  }
  footer kbd {
    font-family: var(--mono); font-size: 10px; border: 1px solid var(--line);
    border-radius: 4px; padding: 1px 5px; background: var(--panel);
  }

  @media (max-width: 640px) {
    .card { padding: 28px 22px 32px; border-radius: 15px; }
    .headline { font-size: 30px; }
    article { font-size: 17px; }
    .lead { font-size: 18px; padding-left: 16px; }
    article h3 { font-size: 19px; }
    .kbd-hint { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .card { animation: none; }
  }
  @media print {
    header.top, .datebar, footer, .progress { display: none; }
    body { background: #fff; }
    .card { border: none; box-shadow: none; padding: 0; }
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <div class="logo">Ai</div>
        <div>
          <h1>AI Data Intelligence</h1>
          <p>Daily training-data briefing</p>
        </div>
      </div>
      <div class="spacer"></div>
      <button class="theme-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle dark mode">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32 1.41-1.41"/></svg>
      </button>
    </div>
  </header>

  <div class="wrap">
    <div class="datebar" id="datebar"></div>
    <div id="content"></div>
    <footer>
      <div class="rule"></div>
      Generated daily by a scheduled Claude task · last 5 briefings
      <span class="kbd-hint"> · <kbd>←</kbd> <kbd>→</kbd> to change day</span>
    </footer>
  </div>

<script>
(function () {
  "use strict";

  // ---------- tiny markdown renderer ----------
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function inline(s) {
    s = esc(s);
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
    // bare urls
    s = s.replace(/(^|[\s(])(https?:\/\/[^\s)]+)/g,
      '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
    return s;
  }
  function mdToHtml(md) {
    const lines = String(md).replace(/\r\n/g, "\n").split("\n");
    let out = [], list = null, para = [];
    const flushP = () => { if (para.length) { out.push("<p>" + inline(para.join(" ")) + "</p>"); para = []; } };
    const flushL = () => { if (list) { out.push("<ul>" + list.join("") + "</ul>"); list = null; } };
    for (let raw of lines) {
      const line = raw.replace(/\s+$/, "");
      if (!line.trim()) { flushP(); flushL(); continue; }
      let m;
      if (/^---+$/.test(line.trim())) { flushP(); flushL(); out.push("<hr>"); continue; }
      if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
        flushP(); flushL();
        const lvl = m[1].length <= 2 ? 2 : 3;
        out.push("<h" + lvl + ">" + inline(m[2]) + "</h" + lvl + ">");
        continue;
      }
      if ((m = line.match(/^\s*[-*•]\s+(.*)$/))) {
        flushP(); if (!list) list = [];
        list.push("<li>" + inline(m[1]) + "</li>");
        continue;
      }
      flushL();
      para.push(line.trim());
    }
    flushP(); flushL();
    return out.join("\n");
  }

  // ---------- data ----------
  const data = (window.BRIEFINGS || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 5);
  const datebar = document.getElementById("datebar");
  const content = document.getElementById("content");
  let current = 0;

  function fmtDate(iso) {
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return { dow: "", dowLong: "", main: iso, full: iso };
    return {
      dow: d.toLocaleDateString(undefined, { weekday: "short" }),
      dowLong: d.toLocaleDateString(undefined, { weekday: "long" }),
      main: d.toLocaleDateString(undefined, { month: "short", day: "numeric" }),
      full: d.toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" })
    };
  }

  function render(i) {
    current = i;
    const b = data[i];
    [...datebar.children].forEach((c, idx) => c.classList.toggle("active", idx === i));
    let body = mdToHtml(b.markdown || b.content || "");
    // promote a leading "Top of mind" paragraph into an editorial standfirst
    body = body.replace(
      /<p><strong>Top of mind:?<\/strong>\s*([\s\S]*?)<\/p>/i,
      '<div class="lead"><span class="lead-kicker">Top of mind</span>$1</div>'
    );
    const f = fmtDate(b.date);
    const gen = b.generatedAt ? new Date(b.generatedAt).toLocaleString(undefined,
      { weekday: "short", hour: "numeric", minute: "2-digit" }) : "";
    content.innerHTML =
      '<div class="card">' +
        '<div class="kicker">' + (f.dowLong || "Daily") + " briefing" + '</div>' +
        '<div class="headline">' + f.full + '</div>' +
        (gen ? '<div class="gen">Generated ' + gen + '</div>' : '') +
        '<article>' + body + '</article>' +
      '</div>';
    window.scrollTo({ top: 0 });
  }

  if (!data.length) {
    content.innerHTML =
      '<div class="card"><div class="empty">' +
        '<div class="big">🗞️</div>' +
        '<h2>No briefings yet</h2>' +
        '<p>Your scheduled task will drop the first briefing here after its next run. ' +
        'Keep this file in the same folder as <code>briefings-data.js</code> and reopen it.</p>' +
      '</div></div>';
  } else {
    data.forEach((b, i) => {
      const f = fmtDate(b.date);
      const pill = document.createElement("button");
      pill.className = "pill";
      pill.innerHTML = '<span class="dow">' + f.dow + (i === 0 ? '<span class="dot"></span>' : '') +
        '</span><span>' + f.main + '</span>';
      pill.title = f.full + (i === 0 ? " (latest)" : "");
      pill.onclick = () => render(i);
      datebar.appendChild(pill);
    });
    render(0);
    // keyboard: ← newer, → older (pills run newest → oldest)
    document.addEventListener("keydown", (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === "ArrowRight" && current < data.length - 1) render(current + 1);
      else if (e.key === "ArrowLeft" && current > 0) render(current - 1);
    });
  }

  // ---------- reading progress ----------
  const progress = document.getElementById("progress");
  function onScroll() {
    const max = document.documentElement.scrollHeight - window.innerHeight;
    progress.style.transform = "scaleX(" + (max > 0 ? Math.min(window.scrollY / max, 1) : 0) + ")";
  }
  window.addEventListener("scroll", onScroll, { passive: true });
  onScroll();

  // ---------- theme ----------
  const btn = document.getElementById("themeBtn");
  const saved = (function(){ try { return localStorage.getItem("briefing-theme"); } catch(e){ return null; } })();
  const initial = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  function setTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    try { localStorage.setItem("briefing-theme", t); } catch(e){}
  }
  setTheme(initial);
  btn.onclick = () => setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
})();
</script>
</body>
</html>
