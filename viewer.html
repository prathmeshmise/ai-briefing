<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Data Intelligence — Daily Briefing</title>
<script src="briefings-data.js"></script>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --ink: #16181d;
    --ink-soft: #4a4f59;
    --ink-faint: #868c98;
    --line: #e4e7ec;
    --accent: #2f6df6;
    --accent-soft: #eaf1ff;
    --pill: #eef0f3;
    --pill-active: #16181d;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.06);
    --serif: Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html[data-theme="dark"] {
    --bg: #0e1014;
    --panel: #171a20;
    --ink: #e9ebef;
    --ink-soft: #b4b9c2;
    --ink-faint: #7c828d;
    --line: #262a32;
    --accent: #6ea0ff;
    --accent-soft: #1b2434;
    --pill: #21252d;
    --pill-active: #e9ebef;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px 80px; }

  header.top {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .top-inner {
    max-width: 1080px; margin: 0 auto; padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .logo {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    background: linear-gradient(135deg, var(--accent), #8a5bff);
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px;
    box-shadow: var(--shadow);
  }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: -0.01em; }
  .brand p { font-size: 12px; margin: 1px 0 0; color: var(--ink-faint); }
  .spacer { flex: 1; }
  .theme-btn {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft);
    width: 38px; height: 38px; border-radius: 10px; cursor: pointer; font-size: 16px;
    display: grid; place-items: center; transition: .15s;
  }
  .theme-btn:hover { color: var(--ink); border-color: var(--ink-faint); }

  .datebar {
    display: flex; gap: 8px; overflow-x: auto; padding: 16px 0 6px;
    scrollbar-width: none;
  }
  .datebar::-webkit-scrollbar { display: none; }
  .pill {
    flex: none; border: 1px solid var(--line); background: var(--pill);
    color: var(--ink-soft); border-radius: 999px; padding: 8px 15px; cursor: pointer;
    font-size: 13px; font-weight: 600; white-space: nowrap; transition: .15s;
    display: flex; flex-direction: column; align-items: flex-start; line-height: 1.25;
  }
  .pill .dow { font-size: 11px; font-weight: 500; color: var(--ink-faint); }
  .pill:hover { border-color: var(--ink-faint); }
  .pill.active { background: var(--pill-active); color: var(--bg); border-color: var(--pill-active); }
  .pill.active .dow { color: var(--bg); opacity: .7; }

  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow); padding: 34px 38px; margin-top: 14px;
  }
  .meta { color: var(--ink-faint); font-size: 13px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .headline { font-size: 26px; letter-spacing: -0.02em; margin: 6px 0 4px; }
  .gen { color: var(--ink-faint); font-size: 12.5px; margin-bottom: 22px; }

  article { font-family: var(--serif); font-size: 17px; color: var(--ink); }
  article h2 {
    font-family: var(--sans); font-size: 13px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent); margin: 30px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
  }
  article h3 { font-family: var(--sans); font-size: 17px; margin: 20px 0 6px; letter-spacing: -0.01em; }
  article p { margin: 0 0 14px; }
  article ul { margin: 0 0 16px; padding-left: 4px; list-style: none; }
  article li { position: relative; padding-left: 22px; margin: 0 0 12px; }
  article li::before {
    content: ""; position: absolute; left: 4px; top: 11px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  article a { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }
  article a:hover { border-bottom-color: var(--accent); }
  article strong { font-weight: 700; }
  article code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .88em;
    background: var(--accent-soft); padding: 1px 6px; border-radius: 5px;
  }
  article hr { border: none; border-top: 1px solid var(--line); margin: 26px 0; }
  .lead {
    font-family: var(--sans); background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
    border-radius: 12px; padding: 16px 18px; margin: 0 0 8px; font-size: 15.5px; color: var(--ink);
  }

  .empty { text-align: center; padding: 70px 20px; color: var(--ink-faint); }
  .empty .big { font-size: 44px; margin-bottom: 10px; }
  .empty h2 { font-family: var(--sans); color: var(--ink); font-size: 19px; margin: 0 0 8px; }
  .empty p { max-width: 460px; margin: 0 auto; font-family: var(--sans); }

  footer { text-align: center; color: var(--ink-faint); font-size: 12.5px; margin-top: 30px; }

  @media (max-width: 640px) {
    .card { padding: 24px 20px; }
    .headline { font-size: 22px; }
    article { font-size: 16px; }
  }
</style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI Data Intelligence</h1>
          <p>Daily training-data industry briefing</p>
        </div>
      </div>
      <div class="spacer"></div>
      <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="wrap">
    <div class="datebar" id="datebar"></div>
    <div id="content"></div>
    <footer>Generated daily by your scheduled Claude task · shows the last 5 briefings</footer>
  </div>

<script>
(function () {
  "use strict";

  // ---------- tiny markdown renderer ----------
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function inline(s) {
    s = esc(s);
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
    // bare urls
    s = s.replace(/(^|[\s(])(https?:\/\/[^\s)]+)/g,
      '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
    return s;
  }
  function mdToHtml(md) {
    const lines = String(md).replace(/\r\n/g, "\n").split("\n");
    let out = [], list = null, para = [];
    const flushP = () => { if (para.length) { out.push("<p>" + inline(para.join(" ")) + "</p>"); para = []; } };
    const flushL = () => { if (list) { out.push("<ul>" + list.join("") + "</ul>"); list = null; } };
    for (let raw of lines) {
      const line = raw.replace(/\s+$/, "");
      if (!line.trim()) { flushP(); flushL(); continue; }
      let m;
      if (/^---+$/.test(line.trim())) { flushP(); flushL(); out.push("<hr>"); continue; }
      if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
        flushP(); flushL();
        const lvl = m[1].length <= 2 ? 2 : 3;
        out.push("<h" + lvl + ">" + inline(m[2]) + "</h" + lvl + ">");
        continue;
      }
      if ((m = line.match(/^\s*[-*•]\s+(.*)$/))) {
        flushP(); if (!list) list = [];
        list.push("<li>" + inline(m[1]) + "</li>");
        continue;
      }
      flushL();
      para.push(line.trim());
    }
    flushP(); flushL();
    return out.join("\n");
  }

  // ---------- data ----------
  const data = (window.BRIEFINGS || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 5);
  const datebar = document.getElementById("datebar");
  const content = document.getElementById("content");

  function fmtDate(iso) {
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return { dow: "", main: iso };
    return {
      dow: d.toLocaleDateString(undefined, { weekday: "short" }),
      main: d.toLocaleDateString(undefined, { month: "short", day: "numeric" })
    };
  }

  function render(i) {
    const b = data[i];
    [...datebar.children].forEach((c, idx) => c.classList.toggle("active", idx === i));
    let body = mdToHtml(b.markdown || b.content || "");
    // promote a leading "Top of mind" paragraph into a highlighted lead box
    body = body.replace(/<p>(<strong>Top of mind:?<\/strong>[\s\S]*?)<\/p>/i, '<div class="lead">$1</div>');
    const gen = b.generatedAt ? new Date(b.generatedAt).toLocaleString() : "";
    content.innerHTML =
      '<div class="card">' +
        '<div class="meta">' + (fmtDate(b.date).dow || "") + ' briefing</div>' +
        '<div class="headline">' + fmtDate(b.date).main + (new Date(b.date+"T00:00:00").getFullYear() ? ", " + new Date(b.date+"T00:00:00").getFullYear() : "") + '</div>' +
        (gen ? '<div class="gen">Generated ' + gen + '</div>' : '') +
        '<article>' + body + '</article>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  if (!data.length) {
    content.innerHTML =
      '<div class="card"><div class="empty">' +
        '<div class="big">📰</div>' +
        '<h2>No briefings yet</h2>' +
        '<p>Your scheduled task will drop the first briefing here after its next 9 AM run. ' +
        'Keep this file in the same folder as <code>briefings-data.js</code> and reopen it.</p>' +
      '</div></div>';
  } else {
    data.forEach((b, i) => {
      const f = fmtDate(b.date);
      const pill = document.createElement("button");
      pill.className = "pill";
      pill.innerHTML = '<span class="dow">' + f.dow + '</span><span>' + f.main + '</span>';
      pill.onclick = () => render(i);
      datebar.appendChild(pill);
    });
    render(0);
  }

  // ---------- theme ----------
  const btn = document.getElementById("themeBtn");
  const saved = (function(){ try { return localStorage.getItem("briefing-theme"); } catch(e){ return null; } })();
  const initial = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  function setTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    btn.textContent = t === "dark" ? "☀️" : "🌙";
    try { localStorage.setItem("briefing-theme", t); } catch(e){}
  }
  setTheme(initial);
  btn.onclick = () => setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
})();
</script>
</body>
</html>
